<!-- docsify app body -->
<div id="app"><br><br>Please wait...</div>
<!-- docsify script config -->
<script>
    const repo = 'https://github.com/KevinThePepper/codedevils_docs/';

    // check connection to google drive
    let failed_drive_str = '';
    let image = new Image();
    image.crossOrigin = 'no-cors';
    image.onerror = () => {
        console.log('Failed to connect to Google Drive. Files/images contained on the Drive will not be loaded');
        failed_drive_str = '!> Failed to connect to Google Drive. Some files/images may not be shown.\n\n';
    };
    image.src = 'https://drive.google.com/uc?id=1dfSKTkPgHFAvW8RiIFludY6hstSshDHH';     // any logo on the drive will do


    window.$docsify = {
        coverpage: true,
        onlyCover: true,
        loadSidebar: true,
        auto2top: true,
        formatUpdated: '{YYYY}-{MM}-{DD}',
        // repo: repo
        plugins: [
            function(hook, vm) {
                // hack for obtaining modified time
                const req = new XMLHttpRequest();
                req.open('GET', document.location, false);
                req.send(null);
                const modified = req.getResponseHeader('last-modified');

                let footer = [
                    `<hr/>`,
                    `<small>`,
                    `<div class="my-footer">`,
                    `<div class="copyright"><a href="https://www.codedevils.org">CodeDevils</a> &copy; 2019. All rights reserved.</div>`,
                    `<div class="modified">`,
                    `Site modified: ` + modified,
                    `</div>`,
                    `</div>`,
                    `</small>`
                ].join('');


                // check whether or not the google drive can be reached
                hook.beforeEach(function(content) {
                    // add last modified to bottom of page
                    const last_modified_str = '<div class="modified-header">Last Modified: <strong>{docsify-updated}</strong></div>\n\n';

                    // append to the top the drive status check made earlier
                    return failed_drive_str + last_modified_str + content;
                });

                hook.afterEach(function (html) {
                    return html + footer;
                });
            }
        ]
    };
</script>
<script src="static/js/docsify.min.js"></script>
